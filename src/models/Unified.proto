// Informational object for supported integrations.

message Integration {
	string type = 1; // Identifier for this integration
	optional string created_at = 2; // Date that this integration was supported (YYYY-MM-DD)
	optional string updated_at = 3; // YYYY-MM-DD
	string name = 4; // The integration's name
	optional bool is_active = 5; // Is this integration active in this workspace
	repeated string categories = 6; // The categories of support solutions that this integration has Valid values: passthrough, hris, ats, auth, crm, enrich, martech, ticketing, uc, accounting, storage, commerce, payment, genai, messaging, kms, task, scim, lms, repo, metadata, calendar, verification, ads, analytics, forms, shipping, assessment, signing, clubs, datastore
	optional string api_docs_url = 7; // The URL of the integration's API documentation
	optional string logo_url = 8; // The URL of the integration's logo
	optional bool in_progress = 9; // If this integration is not yet available as it is currently being built by unified.to
	optional bool is_hidden = 10;
	optional string color = 11; // button background color for AUTH
	optional string text_color = 12; // text color for AUTH
	optional string fa_icon = 13; // font-awesome icon
	repeated string token_names = 14; // if auth_types = 'token'
	repeated string token_instructions = 15; // instructions for the user on how to find the token/key
	optional string web_url = 16; // URL for the software vendor
	optional string rate_limit_description = 17;
	optional bool beta = 18; // This integration is new and is still considered "beta"
	optional bool requires_cname = 19; // OAuth requires a custom API domain (CNAME) for provider verification
	map<string, IntegrationSupport> support = 20;
	optional string tested_at = 21;
	optional google.protobuf.Struct sandbox = 22;
	optional google.protobuf.Struct partnership = 23;
	optional google.protobuf.Struct saml = 24;
	optional string description = 25;
	optional google.protobuf.Struct api = 26;
	optional bool featured = 27;
	optional int32 popularity = 28;
	optional int32 active_healthy_connections = 29;
}

message Invoice {
	string stripe_id = 1;
	string created_at = 2;
	int32 amount = 3;
	int32 connections = 4;
	string plan = 5;
}

message Issue {
	optional string id = 1;
	optional string created_at = 2;
	optional string updated_at = 3;
	string title = 4;
	string status = 5;
	optional string url = 6;
	string workspace_id = 7;
	repeated string type = 8;
	optional int32 resolution_time = 9;
	string ticket_ref = 10;
	optional int32 size = 11; // 1-5, 1 is lowest
	optional int32 importance = 12; // 1-5, 1 is lowest
}

message Permission {
	bool can_create_org = 1;
	bool can_leave_org = 2;
	bool can_downgrade = 3;
	bool can_invite = 4;
	bool can_update_org = 5;
	bool can_add_and_remove_admin = 6;
	bool can_accept_invite = 7;
	bool can_reject_invite = 8;
	bool can_pay = 9;
	bool can_get_invoices = 10;
	bool is_admin = 11;
}

message Plan {
	string name = 1;
	optional string description = 2; // description
	optional int32 max_connections = 3; // Maximum active connections (1+ API call per month)
	optional string stripe_product_id = 4;
	optional string stripe_price_id = 5;
	optional int32 min_price = 6;
	optional int32 price_per_mille_requests = 7;
	optional bool custom_oauth = 8;
	optional int32 max_requests = 9;
	optional string test_stripe_product_id = 10;
	optional string test_stripe_price_id = 11;
	optional int32 min_annual_price = 12;
	optional string stripe_annual_price_id = 13;
	optional string test_stripe_annual_price_id = 14;
	optional string stripe_overage_price_id = 15;
	optional string test_stripe_overage_price_id = 16;
	optional bool dedicated_channel = 17; // Dedicated Slack/Discord channel
}

message SecretsManager {
	optional string id = 1;
	optional string created_at = 2;
	optional string updated_at = 3;
	string type = 4;
	string name = 5;
	optional string workspace_id = 6;
	map<string, string> auth = 7; // secrets-manager specific authentication values
	repeated string dcs = 8; // data-regions
}

message SecretsManagerInstructions {
	optional string type = 1;
	string key = 2;
	string label = 3;
	optional string instructions = 4;
}

message SecretsManagerSecret {
	optional string id = 1; // maps to secretsmanager_id in ISecretsManager
	optional string created_at = 2;
	optional string updated_at = 3;
	optional string name = 4;
	optional string description = 5;
}

// The User object represents you on the system. A user can belong to multiple workspaces (ie. organizations).

message User {
	optional string id = 1;
	optional string created_at = 2;
	optional string updated_at = 3;
	string name = 4;
	string email = 5;
	string workspace_id = 6; // The current workspace
	repeated string workspace_ids = 7; // A list of all of the user's workspaces
	optional string environment = 8;
	optional google.protobuf.Struct meta = 9;
}

// A webhook is used to POST new/updated information to your server.

message Webhook {
	optional string id = 1;
	optional string created_at = 2;
	optional string updated_at = 3;
	optional string workspace_id = 4;
	string connection_id = 5;
	optional string hook_url = 6; // The URL of the webhook
	string object_type = 7; // The object to return (eg. CRM "contact") Valid values: accounting_account, accounting_transaction, accounting_journal, accounting_contact, accounting_invoice, accounting_bill, accounting_vendorcredit, accounting_creditmemo, accounting_taxrate, accounting_organization, accounting_order, accounting_salesorder, accounting_purchaseorder, accounting_report, accounting_balancesheet, accounting_profitloss, accounting_trialbalance, accounting_category, accounting_expense, accounting_cashflow, payment_payment, payment_link, payment_payout, payment_refund, payment_subscription, commerce_item, commerce_collection, commerce_inventory, commerce_location, commerce_review, commerce_saleschannel, commerce_itemvariant, commerce_reservation, commerce_availability, verification_package, verification_request, assessment_package, assessment_order, ats_activity, ats_application, ats_applicationstatus, ats_candidate, ats_document, ats_interview, ats_job, ats_scorecard, ats_company, crm_company, crm_contact, crm_deal, crm_event, crm_lead, crm_pipeline, crm_picklist, hris_employee, hris_group, hris_payslip, hris_timeoff, hris_company, hris_location, hris_device, hris_timeshift, hris_deduction, hris_benefit, hris_bankaccount, hris_document, hris_taxonomy, martech_list, martech_member, martech_campaign, martech_report, passthrough, ticketing_note, ticketing_ticket, ticketing_customer, ticketing_category, uc_contact, uc_call, uc_comment, uc_recording, enrich_person, enrich_company, storage_file, genai_model, genai_prompt, genai_embedding, messaging_message, messaging_channel, messaging_event, kms_space, kms_page, kms_comment, task_project, task_task, task_comment, task_change, scim_users, scim_groups, lms_course, lms_class, lms_student, lms_instructor, lms_content, lms_collection, lms_activity, repo_organization, repo_repository, repo_branch, repo_commit, repo_pullrequest, metadata_metadata, calendar_calendar, calendar_event, calendar_busy, calendar_link, calendar_recording, calendar_webinar, ads_organization, ads_ad, ads_campaign, ads_report, ads_group, ads_creative, ads_insertionorder, ads_target, ads_promoted, analytics_property, analytics_event, analytics_session, analytics_visitor, analytics_report, forms_form, forms_submission, shipping_carrier, shipping_rate, shipping_shipment, shipping_label, shipping_tracking, signing_document, signing_signatory, signing_template, clubs_group, clubs_member, clubs_activity, clubs_location, clubs_event, datastore_database, datastore_table, datastore_record, datastore_query
	optional int32 interval = 8; // The interval (in minutes) to check for updated/new objets. 
	string checked_at = 9; // The last date/time that a check was done on this object
	string integration_type = 10;
	optional string environment = 11;
	string event = 12;
	repeated string runs = 13; // An array of the most revent virtual webhook runs
	optional string fields = 14;
	optional string webhook_type = 15;
	optional google.protobuf.Struct meta = 16;
	optional bool is_healthy = 17;
	optional int32 page_max_limit = 18;
	map<string, string> filters = 19;
	optional string db_type = 20;
	optional string db_url = 21;
	optional string db_schema = 22;
	optional string db_name_prefix = 23;
	optional bool is_paused = 24;
	optional bool is_beta = 25;
}

message WebhookData {
	repeated google.protobuf.Struct data = 1; // The data array will contact an array of specific objects according to the webhook's connection. (eg. CRM Contacts)
	Webhook webhook = 2; // The webhook object
	string nonce = 3; // random string
	optional string sig = 4; // @deprecated; use sig256 instead
	optional string sig256 = 5; // HMAC-SHA256(workspace.secret, data + nonce)
	string type = 6;
	optional string external_xref = 7;
}

message WorkspaceIpAllowlistEntry {
	string ip_address = 1;
	optional string name = 2;
	optional string expires_at = 3;
}

// The User's workspace object. A workspace is like an organization that one or more users belong to.

message Workspace {
	optional string id = 1;
	optional string created_at = 2;
	optional string updated_at = 3;
	string name = 4;
	repeated string admin_ids = 5; // Only these users can add additional admins and invite other users
	repeated string invited_emails = 6;
	optional string pay_user_id = 7;
	optional string plan = 8;
	optional string stripe_customer = 9;
	repeated string stripe_subscriptions = 10;
	repeated string stripe_prices = 11;
	optional string secret = 12; // Workspace API secret
	repeated WorkspaceIpAllowlistEntry ip_allowlist = 13;
	optional bool restrict_ips = 14;
	optional string datadog_apikey = 15;
	optional string datadog_site = 16;
	repeated string environments = 17; // a list of authentication environments for the workspace integrations
	repeated string add_ons = 18;
	optional google.protobuf.Struct checklist = 19;
	optional string plan_term = 20; // monthly or yearly Valid values: monthly, yearly Default value: monthly
	optional string stripe_canceling_at = 21;
	optional string domain = 22; // when set, users of the same domain will auto-join this workspace.  must not be gmail.com or other public domains
	optional string event_webhook_url = 23;
	repeated string event_webhook_events = 24;
	optional string custom_auth_domain = 25;
	optional bool custom_auth_domain_valid = 26;
	optional string custom_api_domain = 27;
	optional bool slow_fields_opt_in = 28;
	optional string notion_verification_token = 29;
	optional string favicon_url = 30;
	optional bool is_baa = 31;
	optional string saml_integration_type = 32;
	optional string saml_idp_url = 33;
	optional string saml_idp_entity_id = 34;
	optional string saml_pem = 35; // the PEM X.509 certificate in Base64 ASCII format
	optional bool saml_only_login = 36; // if true, only allow SAML login
	repeated string sync_objects = 37;
	optional string sync_parent_dc = 38; // us, eu, au
	optional string grafana_apikey = 39;
	optional string grafana_site = 40;
	optional string grafana_username = 41; // Required when `grafana_auth_type` is `basic` (e.g. Grafana Cloud user / instance id)
	optional string grafana_auth_type = 42;
	optional string clickhouse_url = 43;
	optional string clickhouse_username = 44;
	optional string clickhouse_password = 45;
	optional bool auto_join = 46;
	optional string jwt_secret = 47;
	optional string default_secretsmanager_id = 48; // Default SecretsManager document id for new credentials
	map<string, string> default_secretsmanager_env_ids = 49; // Environment name to SecretsManager document id
}

message WorkspaceIntegrationAuth {
	optional string client_id = 1;
	optional string client_secret = 2;
	optional string consumer_key = 3;
	optional string consumer_secret = 4;
	optional string pem = 5; // the PEM X.509 certificate in Base64 ASCII format
	optional string key = 6; // the private KEY X.509 certificate in Base64 ASCII format
	optional string dev_api_key = 7;
}

message WorkspaceIntegration {
	optional string id = 1;
	optional string created_at = 2;
	optional string updated_at = 3;
	optional string workspace_id = 4;
	string integration_type = 5;
	bool is_active = 6;
	optional string api_url = 7;
	optional string authorize_url = 8;
	optional string token_url = 9;
	optional string refresh_url = 10;
	optional string base_url = 11;
	optional bool prompt_region = 12;
	optional bool use_unified_redirect = 13;
	optional string auth_type = 14; // the authentication method to use for this workspace integration; when set, it overrides the default auth-method selection (e.g. force 'token' even when Unified OAUTH credentials exist) Valid values: oauth1, oauth2, other, token
	optional string environment = 15; // authentication environment Default value: Production
	repeated string categories = 16;
	map<string, string> overriden_scopes = 17;
	optional WorkspaceIntegrationAuth auth = 18;
	optional string secretsmanager_id = 19; // the ID of the SecretsManager object
	optional string secretsmanager_key = 20; // the key/path/name of the secret within the vault
}

